syntax = "proto3";

package openstatus.private_location.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "openstatus/private_location/v1/private_location.proto";

option go_package = "github.com/openstatushq/openstatus/packages/proto/openstatus/private_location/v1;privatelocationv1";

// PrivateLocationService provides CRUD operations for private locations —
// self-hosted checker agents that run monitors from your own network.
service PrivateLocationService {
  // CreatePrivateLocation creates a new private location and returns its
  // generated agent token.
  rpc CreatePrivateLocation(CreatePrivateLocationRequest) returns (CreatePrivateLocationResponse) {
    option (gnostic.openapi.v3.operation) = {
      description: "Creates a private location. The agent token is generated by the server and returned in the response - it cannot be supplied by the caller. Use the token to configure the agent so it can pull its monitors and report results."
    };
  }

  // GetPrivateLocation retrieves a single private location by ID, including
  // its agent token.
  rpc GetPrivateLocation(GetPrivateLocationRequest) returns (GetPrivateLocationResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // ListPrivateLocations returns a paginated list of private location
  // summaries. Agent tokens are not included - use GetPrivateLocation.
  rpc ListPrivateLocations(ListPrivateLocationsRequest) returns (ListPrivateLocationsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }

  // UpdatePrivateLocation updates a private location.
  rpc UpdatePrivateLocation(UpdatePrivateLocationRequest) returns (UpdatePrivateLocationResponse);

  // DeletePrivateLocation removes a private location.
  rpc DeletePrivateLocation(DeletePrivateLocationRequest) returns (DeletePrivateLocationResponse);
}

// CreatePrivateLocationRequest is the request to create a new private location.
message CreatePrivateLocationRequest {
  // Display name for the private location (required, 1-256 characters).
  string name = 1 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 256
    },
    (gnostic.openapi.v3.property) = {example: {yaml: "eu-west-agent"}}
  ];

  // IDs of monitors this private location should run (optional).
  repeated string monitor_ids = 2;

  // User-defined key/value labels (optional, up to 20 entries).
  map<string, string> metadata = 3 [(buf.validate.field).map = {
    max_pairs: 20
    keys: {string: {min_len: 1, max_len: 64}}
    values: {string: {max_len: 256}}
  }];
}

// CreatePrivateLocationResponse is the response after creating a private location.
message CreatePrivateLocationResponse {
  // The created private location, including its generated agent token.
  PrivateLocation private_location = 1;
}

// GetPrivateLocationRequest is the request to get a private location by ID.
message GetPrivateLocationRequest {
  // ID of the private location to retrieve (required).
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// GetPrivateLocationResponse is the response containing the private location.
message GetPrivateLocationResponse {
  // The requested private location.
  PrivateLocation private_location = 1;
}

// ListPrivateLocationsRequest is the request to list private locations.
message ListPrivateLocationsRequest {
  // Maximum number of private locations to return (1-100, defaults to 50).
  optional int32 limit = 1 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];

  // Number of private locations to skip for pagination (defaults to 0).
  optional int32 offset = 2 [(buf.validate.field).int32.gte = 0];
}

// ListPrivateLocationsResponse is the response containing private location summaries.
message ListPrivateLocationsResponse {
  // List of private locations.
  repeated PrivateLocationSummary private_locations = 1;

  // Total number of private locations in the workspace.
  int32 total_size = 2;
}

// UpdatePrivateLocationRequest is the request to update a private location.
message UpdatePrivateLocationRequest {
  // ID of the private location to update (required).
  string id = 1 [(buf.validate.field).string.min_len = 1];

  // New display name for the private location (optional).
  optional string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 256
  }];

  // New list of monitor IDs. Only applied when update_monitor_ids is true.
  repeated string monitor_ids = 3;

  // When true, monitor_ids replaces the current associations (an empty list
  // clears all). When false or unset, monitor_ids is ignored and existing
  // associations are preserved.
  optional bool update_monitor_ids = 4;

  // New key/value labels. Only applied when update_metadata is true.
  map<string, string> metadata = 5 [(buf.validate.field).map = {
    max_pairs: 20
    keys: {string: {min_len: 1, max_len: 64}}
    values: {string: {max_len: 256}}
  }];

  // When true, metadata replaces the current labels (an empty map clears all).
  // When false or unset, metadata is ignored and existing labels are preserved.
  optional bool update_metadata = 6;
}

// UpdatePrivateLocationResponse is the response after updating a private location.
message UpdatePrivateLocationResponse {
  // The updated private location.
  PrivateLocation private_location = 1;
}

// DeletePrivateLocationRequest is the request to delete a private location.
message DeletePrivateLocationRequest {
  // ID of the private location to delete (required).
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

// DeletePrivateLocationResponse is the response after deleting a private location.
message DeletePrivateLocationResponse {
  // Whether the deletion was successful.
  bool success = 1;
}
