networks:
    openstatus:
        driver: bridge
        name: openstatus

volumes:
    libsql-data:
        name: openstatus-libsql-data
    workflows-data:
        name: openstatus-workflows-data

services:
    # External services
    libsql:
        container_name: openstatus-libsql
        image: ghcr.io/tursodatabase/libsql-server:latest
        networks:
            - openstatus
        ports:
            - "8080:8080"
            - "5001:5001"
        volumes:
            - libsql-data:/var/lib/sqld
        environment:
            - SQLD_NODE=primary
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'perl -e ''use IO::Socket::INET; exit(IO::Socket::INET->new(PeerAddr=>"127.0.0.1:8080",Timeout=>1) ? 0 : 1);''',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        restart: unless-stopped

    tinybird-local:
        container_name: openstatus-tinybird
        image: tinybirdco/tinybird-local:latest
        platform: linux/amd64
        networks:
            - openstatus
        ports:
            - "7181:7181"
        environment:
            - COMPATIBILITY_MODE=1
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:7181/"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        restart: unless-stopped

    # Internal Services - Using GitHub Packages
    # Idempotent: drizzle skips already-applied migrations on every up.
    # Intentionally the only locally-built service in this file; a
    # ghcr-published image could replace it later.
    db-migrate:
        container_name: openstatus-db-migrate
        build:
            context: .
            dockerfile: packages/db/Dockerfile
        image: openstatus/db-migrate:latest
        # rebuild on every up so a stale image never skips new migrations;
        # also exempts this service from `docker compose pull`
        pull_policy: build
        networks:
            - openstatus
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
        depends_on:
            libsql:
                condition: service_healthy
        # retries absorb transient DB races; still settles to failure for the gates
        restart: on-failure:3

    workflows:
        container_name: openstatus-workflows
        image: ghcr.io/openstatushq/openstatus-workflows:latest
        networks:
            - openstatus
        ports:
            - "3000:3000"
        volumes:
            - workflows-data:/app/data
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - PORT=3000
        depends_on:
            db-migrate:
                condition: service_completed_successfully
            libsql:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/ping"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    server:
        container_name: openstatus-server
        image: ghcr.io/openstatushq/openstatus-server:latest
        networks:
            - openstatus
        ports:
            - "3001:3000"
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - PORT=3000
        depends_on:
            db-migrate:
                condition: service_completed_successfully
            workflows:
                condition: service_healthy
            libsql:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/ping"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    private-location:
        container_name: openstatus-private-location
        image: ghcr.io/openstatushq/openstatus-private-location:latest
        networks:
            - openstatus
        ports:
            - "8081:8080"
        env_file:
            - .env.docker
        environment:
            - DB_URL=http://libsql:8080
            - TINYBIRD_URL=http://tinybird-local:7181
            - GIN_MODE=release
            - PORT=8080
        depends_on:
            server:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--spider",
                    "-q",
                    "http://localhost:8080/health",
                ]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    checker:
        container_name: openstatus-checker
        image: ghcr.io/openstatushq/openstatus-checker:latest
        networks:
            - openstatus
        ports:
            - "8082:8080"
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - PORT=8080
        depends_on:
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 30s
        restart: unless-stopped

    dashboard:
        container_name: openstatus-dashboard
        image: ghcr.io/openstatushq/openstatus-dashboard:latest
        networks:
            - openstatus
        ports:
            - "3002:3000"
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - PORT=3000
            - HOSTNAME=0.0.0.0
            - AUTH_TRUST_HOST=true
        depends_on:
            db-migrate:
                condition: service_completed_successfully
            workflows:
                condition: service_healthy
            libsql:
                condition: service_healthy
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 45s
        restart: unless-stopped

    status-page:
        container_name: openstatus-status-page
        image: ghcr.io/openstatushq/openstatus-status-page:latest
        networks:
            - openstatus
        ports:
            - "3003:3000"
        env_file:
            - .env.docker
        environment:
            - DATABASE_URL=http://libsql:8080
            - PORT=3000
            - HOSTNAME=0.0.0.0
            - AUTH_TRUST_HOST=true
        depends_on:
            db-migrate:
                condition: service_completed_successfully
            workflows:
                condition: service_healthy
            libsql:
                condition: service_healthy
            server:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/"]
            interval: 15s
            timeout: 10s
            retries: 3
            start_period: 45s
        restart: unless-stopped
